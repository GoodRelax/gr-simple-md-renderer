<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PoC v3c: Preview touchstart with normal-flow content</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; font-size: 14px; background: #f5f5f5; }
.top-bar { padding: 8px 12px; background: #8e44ad; color: #fff; font-size: 13px; font-weight: bold; }
#editor {
  display: block; width: 100%; height: 80px; padding: 8px; font-size: 14px;
  border: 2px solid #8e44ad; resize: none; outline: none;
}
#editor:focus { border-color: #e74c3c; background: #fff8f0; }
#preview {
  min-height: calc(100vh - 240px); padding: 16px; background: #fff;
}
#affordance {
  color: #999; font-size: 16px; text-align: center; padding-top: 40px;
}
.status {
  position: fixed; top: 8px; right: 8px; padding: 4px 8px;
  border-radius: 4px; font-size: 11px; z-index: 10001;
  background: #8e44ad; color: #fff;
}
#log {
  position: fixed; bottom: 0; left: 0; right: 0; height: 120px;
  background: #1a1a1a; color: #0f0; font-family: monospace; font-size: 11px;
  overflow-y: auto; padding: 4px 8px; white-space: pre-wrap; word-break: break-all;
  z-index: 10000;
}
</style>
</head>
<body>
<div class="top-bar">PoC v3c: Preview touchstart then editor.focus()</div>
<textarea id="editor" placeholder="Editor area. Paste here..."></textarea>
<div id="preview">
  <div id="affordance">
    Tap anywhere in this preview area.<br>
    This text is in normal document flow (not position:absolute).<br>
    The preview div has min-height so blank areas should also respond.
  </div>
</div>
<div class="status" id="status">waiting</div>
<div id="log"></div>
<script>
var editor = document.getElementById("editor");
var preview = document.getElementById("preview");
var logEl = document.getElementById("log");
var statusEl = document.getElementById("status");

function log(msg) {
  var d = new Date();
  var ts = [d.getHours(), d.getMinutes(), d.getSeconds()]
    .map(function(v) { return String(v).padStart(2, "0"); }).join(":");
  logEl.textContent += ts + " " + msg + "\n";
  logEl.scrollTop = logEl.scrollHeight;
}

var isTouchDevice = ("ontouchstart" in window) && navigator.maxTouchPoints > 0;
log("isTouchDevice=" + isTouchDevice);

preview.addEventListener("touchstart", function(e) {
  log("preview.touchstart target=" + e.target.id);
  e.preventDefault();
  editor.focus();
  var ok = document.activeElement === editor;
  log("focus() result: " + (ok ? "SUCCESS" : "FAIL") + " activeElement=" + document.activeElement.tagName);
  statusEl.textContent = ok ? "FOCUSED" : "focus failed";
  statusEl.style.background = ok ? "#27ae60" : "#e74c3c";
}, { passive: false });

preview.addEventListener("click", function(e) {
  log("preview.click target=" + e.target.id);
  editor.focus();
  log("click focus(), activeElement=" + document.activeElement.id);
});

preview.addEventListener("touchend", function(e) {
  log("preview.touchend");
});

["focus", "blur", "paste", "input"].forEach(function(evt) {
  editor.addEventListener(evt, function() {
    log("editor." + evt);
  });
});

editor.addEventListener("paste", function(e) {
  var text = e.clipboardData ? e.clipboardData.getData("text/plain") : "";
  log("paste: " + text.length + "ch");
});
</script>
</body>
</html>
