<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PoC v3a: Overlay + focus() in touchstart</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; font-size: 14px; background: #f5f5f5; }
.top-bar { padding: 8px 12px; background: #333; color: #fff; font-size: 13px; font-weight: bold; }
#editor {
  display: block; width: 100%; height: 80px; padding: 8px; font-size: 14px;
  border: 2px solid #2980b9; resize: none; outline: none;
}
#editor:focus { border-color: #e74c3c; background: #fff8f0; }
#preview {
  position: relative; min-height: calc(100vh - 240px); padding: 16px; background: #fff;
}
#affordance { color: #999; font-size: 16px; text-align: center; padding-top: 40px; }
#touch-overlay {
  display: none; position: fixed; inset: 0; z-index: 9999;
  background: rgba(41, 128, 185, 0.15); cursor: pointer;
}
#touch-overlay .hint {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.75); color: #fff; padding: 20px 30px;
  border-radius: 12px; font-size: 18px; text-align: center; pointer-events: none;
}
#log {
  position: fixed; bottom: 0; left: 0; right: 0; height: 120px;
  background: #1a1a1a; color: #0f0; font-family: monospace; font-size: 11px;
  overflow-y: auto; padding: 4px 8px; white-space: pre-wrap; word-break: break-all;
  z-index: 10000;
}
</style>
</head>
<body>
<div class="top-bar">PoC v3a: Overlay touchstart then remove then focus()</div>
<textarea id="editor" placeholder="Editor area. Paste here..."></textarea>
<div id="preview">
  <div id="affordance">Drop a Markdown file or paste text into the editor above.</div>
</div>
<div id="touch-overlay">
  <div class="hint">Tap anywhere to activate editor<br>(touch overlay active)</div>
</div>
<div id="log"></div>
<script>
var editor = document.getElementById("editor");
var overlay = document.getElementById("touch-overlay");
var logEl = document.getElementById("log");

function log(msg) {
  var d = new Date();
  var ts = [d.getHours(), d.getMinutes(), d.getSeconds()]
    .map(function(v) { return String(v).padStart(2, "0"); }).join(":");
  logEl.textContent += ts + " " + msg + "\n";
  logEl.scrollTop = logEl.scrollHeight;
}

var isTouchDevice = ("ontouchstart" in window) && navigator.maxTouchPoints > 0;
log("isTouchDevice=" + isTouchDevice + " maxTouchPoints=" + navigator.maxTouchPoints);

if (isTouchDevice) {
  overlay.style.display = "block";
  log("Overlay shown");

  overlay.addEventListener("touchstart", function(e) {
    log("overlay touchstart");
    e.preventDefault();
    overlay.style.display = "none";
    editor.focus();
    log("focus() called, activeElement=" + document.activeElement.id);
  }, { passive: false });

  overlay.addEventListener("click", function(e) {
    log("overlay click (fallback)");
    overlay.style.display = "none";
    editor.focus();
    log("click focus(), activeElement=" + document.activeElement.id);
  });
} else {
  log("PC mode: no overlay needed");
}

["focus", "blur", "paste", "input"].forEach(function(evt) {
  editor.addEventListener(evt, function() {
    var val = evt === "input" ? editor.value.length + "ch" : "";
    log("editor." + evt + " " + val);
  });
});

editor.addEventListener("paste", function(e) {
  var text = e.clipboardData ? e.clipboardData.getData("text/plain") : "";
  log("paste content: " + text.length + "ch");
});
</script>
</body>
</html>
