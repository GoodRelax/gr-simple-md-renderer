<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PoC v3b: Full-size hidden textarea behind preview</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; font-size: 14px; background: #f5f5f5; }
.top-bar { padding: 8px 12px; background: #27ae60; color: #fff; font-size: 13px; font-weight: bold; }
#editor {
  display: block; width: 100%; height: 80px; padding: 8px; font-size: 14px;
  border: 2px solid #27ae60; resize: none; outline: none;
}
#editor:focus { border-color: #e74c3c; background: #fff8f0; }
#preview-container { position: relative; min-height: calc(100vh - 240px); }
#hidden-paste-target {
  position: absolute; inset: 0; width: 100%; height: 100%;
  opacity: 0.01; font-size: 16px; resize: none; border: none; outline: none; z-index: 1;
}
#preview {
  position: relative; z-index: 0; padding: 16px; background: #fff; pointer-events: none;
}
#affordance { color: #999; font-size: 16px; text-align: center; padding-top: 40px; }
.state-label {
  position: fixed; top: 8px; right: 8px; background: #e74c3c; color: #fff;
  padding: 4px 8px; border-radius: 4px; font-size: 11px; z-index: 10001;
}
#log {
  position: fixed; bottom: 0; left: 0; right: 0; height: 120px;
  background: #1a1a1a; color: #0f0; font-family: monospace; font-size: 11px;
  overflow-y: auto; padding: 4px 8px; white-space: pre-wrap; word-break: break-all;
  z-index: 10000;
}
</style>
</head>
<body>
<div class="top-bar">PoC v3b: Full-size hidden textarea behind preview</div>
<textarea id="editor" placeholder="Editor area (visible). Paste here..."></textarea>
<div id="preview-container">
  <textarea id="hidden-paste-target" aria-hidden="true"></textarea>
  <div id="preview">
    <div id="affordance">Tap anywhere in this area. A hidden textarea covers it.</div>
  </div>
</div>
<div class="state-label" id="stateLabel">pre-render</div>
<div id="log"></div>
<script>
var editor = document.getElementById("editor");
var hidden = document.getElementById("hidden-paste-target");
var logEl = document.getElementById("log");

function log(msg) {
  var d = new Date();
  var ts = [d.getHours(), d.getMinutes(), d.getSeconds()]
    .map(function(v) { return String(v).padStart(2, "0"); }).join(":");
  logEl.textContent += ts + " " + msg + "\n";
  logEl.scrollTop = logEl.scrollHeight;
}

var isTouchDevice = ("ontouchstart" in window) && navigator.maxTouchPoints > 0;
log("isTouchDevice=" + isTouchDevice);

hidden.addEventListener("paste", function(e) {
  var text = e.clipboardData ? e.clipboardData.getData("text/plain") : "";
  log("hidden.paste: " + text.length + "ch");
  if (text) {
    editor.value = text;
    log("Transferred to editor");
    document.getElementById("stateLabel").textContent = "pasted!";
    document.getElementById("stateLabel").style.background = "#27ae60";
  }
});

hidden.addEventListener("input", function() {
  log("hidden.input: " + hidden.value.length + "ch");
  if (hidden.value.length > 0) {
    editor.value = hidden.value;
    hidden.value = "";
    log("Transferred via input event");
    document.getElementById("stateLabel").textContent = "pasted!";
    document.getElementById("stateLabel").style.background = "#27ae60";
  }
});

["focus", "blur", "touchstart", "click"].forEach(function(evt) {
  hidden.addEventListener(evt, function() { log("hidden." + evt); });
});

["focus", "blur", "paste", "input"].forEach(function(evt) {
  editor.addEventListener(evt, function() { log("editor." + evt); });
});
</script>
</body>
</html>
